app = "sift-factcheck"
primary_region = "sjc"

[build]

# ── Two processes in one app ──────────────────────────
[processes]
  web    = "uvicorn api.main:app --host 0.0.0.0 --port 8000"
  worker = "celery -A api.tasks worker --loglevel=info --concurrency=1 --pool=solo"

# ── HTTP service (web process only) ──────────────────
[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["web"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

# ── Machine sizes ─────────────────────────────────────
[[vm]]
  processes  = ["web"]
  memory     = "512mb"
  cpu_kind   = "shared"
  cpus       = 1

[[vm]]
  processes  = ["worker"]
  memory     = "1gb"        # worker loads embedding model — needs more RAM
  cpu_kind   = "shared"
  cpus       = 1
